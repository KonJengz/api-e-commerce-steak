services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.droplet}
    environment:
      PORT: "8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/readyz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      edge:
        aliases:
          - ${SERVICE_NAME:-backend-rust-2-api}

networks:
  edge:
    external: true
    name: edge
