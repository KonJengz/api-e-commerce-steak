services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ${PROXY_ENV_FILE:-.env.proxy}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/proxy/sites:/etc/caddy/sites:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
    external: true
    name: edge

volumes:
  caddy_data:
  caddy_config:
